services:
  postgres:
    image: postgres:16-alpine
    container_name: flipkart_clone_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: flipkart
      POSTGRES_PASSWORD: flipkart
      POSTGRES_DB: flipkart_clone
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - flipkart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipkart -d flipkart_clone"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  flipkart_pgdata:
